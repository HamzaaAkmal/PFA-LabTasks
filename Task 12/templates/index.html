<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 11 - Admission QnA Bot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="wrap">
    <h2>Admission QnA Bot (MiniLM + FAISS)</h2>
    <p class="sub">Ask questions related to admission, fee, contact, and programs.</p>

    <div id="chat" class="chat">
      <div class="msg bot">Hi, ask me any admission question.</div>
    </div>

    <div class="row">
      <input id="q" type="text" placeholder="Example: how can i apply?" />
      <button id="send">Ask</button>
    </div>

    <div id="matches" class="matches"></div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
